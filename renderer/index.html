<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>HTML2MD</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="app-header">
      <div class="app-header-inner">
        <h1 class="app-title">HTML2MD</h1>
        <span class="app-subtitle">SingleFile / WeChat → Markdown</span>
      </div>
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="8" cy="8" r="3.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/>
        </svg>
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M14 9.68A6 6 0 016.32 2 6.5 6.5 0 1014 9.68z"/>
        </svg>
      </button>
    </header>

    <!-- Input Card -->
    <section class="card">
      <label class="card-label">Input</label>
      <div class="input-group">
        <input type="text" id="inputPath" class="input" placeholder="Select HTML files or folder..." readonly>
        <button class="btn btn-ghost" onclick="pickFiles()">Files</button>
        <button class="btn btn-ghost" onclick="pickFolder()">Folder</button>
      </div>
      <div id="fileCount" class="hint"></div>
    </section>

    <!-- Output Card -->
    <section class="card">
      <label class="card-label">Output</label>
      <div class="input-group">
        <input type="text" id="outputPath" class="input" placeholder="Same as source (default)">
        <button class="btn btn-ghost" onclick="pickOutput()">Browse</button>
      </div>
    </section>

    <!-- Options Card -->
    <section class="card card-row">
      <label class="toggle">
        <input type="checkbox" id="optDownload" checked>
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
        <span class="toggle-text">Download remote images</span>
      </label>
    </section>

    <!-- Convert Button -->
    <button class="btn-primary" id="convertBtn" onclick="startConvert()">
      Convert
    </button>

    <!-- Progress -->
    <div class="progress-wrap" id="progressSection">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <span class="progress-label" id="statusText"></span>
    </div>

    <!-- Log -->
    <section class="card card-log hidden" id="logSection">
      <div class="log" id="logBox"></div>
    </section>

    <!-- Actions -->
    <button class="btn btn-outline hidden" id="actions" onclick="openOutput()">
      Open Output Folder
    </button>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
