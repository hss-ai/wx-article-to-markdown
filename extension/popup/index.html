<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg: #ffffff;
      --bg2: #f4f4f5;
      --border: #e4e4e7;
      --text: #18181b;
      --text2: #71717a;
      --text3: #a1a1aa;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --success: #16a34a;
      --error: #dc2626;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 13px;
      color: var(--text);
      background: var(--bg2);
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 14px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header span {
      font-size: 11px;
      color: var(--text3);
    }

    .card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .page-title {
      font-size: 13px;
      color: var(--text);
      line-height: 1.4;
      word-break: break-all;
    }

    .page-meta {
      font-size: 11px;
      color: var(--text3);
      margin-top: 4px;
    }

    .btn-primary {
      width: 100%;
      height: 36px;
      border: none;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .status {
      font-size: 11px;
      color: var(--text3);
      margin-top: 8px;
      text-align: center;
    }

    .status.ok { color: var(--success); }
    .status.err { color: var(--error); }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .toggle-row input[type="checkbox"] {
      accent-color: var(--accent);
      width: 14px;
      height: 14px;
    }

    .toggle-row span {
      font-size: 12px;
      color: var(--text2);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>HTML2MD</h1>
    <span>Web → Markdown</span>
  </div>

  <div class="card" id="pageInfo">
    <div class="label">Current Page</div>
    <div class="page-title" id="pageTitle">Loading...</div>
    <div class="page-meta" id="pageMeta"></div>
  </div>

  <div class="toggle-row">
    <input type="checkbox" id="optImages" checked>
    <span>Include images</span>
  </div>

  <button class="btn-primary" id="convertBtn">Convert & Download</button>
  <div class="status" id="status"></div>

  <script src="lib/turndown.js"></script>
  <script src="popup.js"></script>
</body>
</html>
