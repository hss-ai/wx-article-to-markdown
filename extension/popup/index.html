<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg: #ffffff;
      --bg2: #f4f4f5;
      --border: #e4e4e7;
      --text: #18181b;
      --text2: #71717a;
      --text3: #a1a1aa;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --success: #16a34a;
      --error: #dc2626;
      --warn: #d97706;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 13px;
      color: var(--text);
      background: var(--bg2);
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 12px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header span {
      font-size: 11px;
      color: var(--text3);
    }

    /* Tab bar */
    .tab-bar {
      display: flex;
      gap: 0;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      background: var(--bg);
    }

    .tab-btn {
      flex: 1;
      border: none;
      background: var(--bg);
      color: var(--text2);
      font-size: 12px;
      font-weight: 600;
      padding: 8px 0;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }

    .tab-btn:not(:last-child) {
      border-right: 1px solid var(--border);
    }

    .tab-btn.active {
      background: var(--accent);
      color: #fff;
    }

    .tab-btn .badge {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      border-radius: 8px;
      padding: 1px 5px;
      margin-left: 4px;
      min-width: 16px;
      text-align: center;
    }

    .tab-btn.active .badge {
      background: rgba(255,255,255,0.3);
    }

    /* Tab content */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .page-title {
      font-size: 13px;
      color: var(--text);
      line-height: 1.4;
      word-break: break-all;
    }

    .page-meta {
      font-size: 11px;
      color: var(--text3);
      margin-top: 4px;
    }

    .converted-badge {
      display: none;
      font-size: 11px;
      color: var(--success);
      font-weight: 600;
      margin-top: 6px;
    }

    .converted-badge.show { display: block; }

    .btn-primary {
      width: 100%;
      height: 36px;
      border: none;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .status {
      font-size: 11px;
      color: var(--text3);
      margin-top: 8px;
      text-align: center;
    }

    .status.ok { color: var(--success); }
    .status.err { color: var(--error); }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .toggle-row input[type="checkbox"] {
      accent-color: var(--accent);
      width: 14px;
      height: 14px;
    }

    .toggle-row span {
      font-size: 12px;
      color: var(--text2);
    }

    /* History panel */
    .history-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .history-search {
      flex: 1;
      height: 30px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0 10px;
      font-size: 12px;
      outline: none;
      transition: border 0.15s;
    }

    .history-search:focus { border-color: var(--accent); }

    .btn-clear {
      height: 30px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--error);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }

    .btn-clear:hover { background: #fef2f2; border-color: var(--error); }

    .history-list {
      max-height: 300px;
      overflow-y: auto;
    }

    .history-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 6px;
      position: relative;
      transition: border-color 0.15s;
    }

    .history-item:hover { border-color: var(--accent); }

    .history-item-title {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
      cursor: pointer;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .history-item-title:hover { color: var(--accent); }

    .history-item-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 4px;
    }

    .history-item-info {
      font-size: 10px;
      color: var(--text3);
    }

    .history-item-delete {
      border: none;
      background: none;
      color: var(--text3);
      font-size: 14px;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 3px;
      line-height: 1;
      transition: all 0.15s;
    }

    .history-item-delete:hover { color: var(--error); background: #fef2f2; }

    .history-empty {
      text-align: center;
      padding: 30px 0;
      color: var(--text3);
      font-size: 12px;
    }

    .history-stats {
      text-align: center;
      font-size: 11px;
      color: var(--text3);
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>HTML2MD</h1>
    <span>Web → Markdown</span>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="convert">Convert</button>
    <button class="tab-btn" data-tab="history">History <span class="badge" id="historyCount" style="display:none">0</span></button>
  </div>

  <!-- Convert Tab -->
  <div class="tab-content active" id="tab-convert">
    <div class="card" id="pageInfo">
      <div class="label">Current Page</div>
      <div class="page-title" id="pageTitle">Loading...</div>
      <div class="page-meta" id="pageMeta"></div>
      <div class="converted-badge" id="convertedBadge">&#10003; Already converted</div>
    </div>

    <div class="toggle-row">
      <input type="checkbox" id="optImages" checked>
      <span>Include images</span>
    </div>

    <button class="btn-primary" id="convertBtn">Convert & Download</button>
    <div class="status" id="status"></div>
  </div>

  <!-- History Tab -->
  <div class="tab-content" id="tab-history">
    <div class="history-toolbar">
      <input type="text" class="history-search" id="historySearch" placeholder="Search history...">
      <button class="btn-clear" id="clearAllBtn">Clear All</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty">No conversion history yet.</div>
    </div>
    <div class="history-stats" id="historyStats"></div>
  </div>

  <script src="lib/turndown.js"></script>
  <script src="popup.js"></script>
</body>
</html>
