name: Build & Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  build-electron:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: win
          - os: macos-latest
            platform: mac
            artifact: mac
          - os: ubuntu-latest
            platform: linux
            artifact: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app (Windows)
        if: matrix.platform == 'win'
        run: npm run build:win

      - name: Build Electron app (macOS)
        if: matrix.platform == 'mac'
        run: npm run build:mac

      - name: Build Electron app (Linux)
        if: matrix.platform == 'linux'
        run: npm run build:linux

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.blockmap
            release/*.yml
          if-no-files-found: error

  package-extension:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync version to manifest.json
        run: |
          VERSION=$(node -p "require('./package.json').version")
          cd extension
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" manifest.json
          echo "Extension version: $VERSION"
          cat manifest.json | grep version

      - name: Package extension as ZIP
        run: |
          cd extension
          zip -r ../html2md-extension.zip .
          cd ..

      - name: Upload extension
        uses: actions/upload-artifact@v4
        with:
          name: extension
          path: html2md-extension.zip

  release:
    needs: [build-electron, package-extension]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Rename extension ZIP with version
        run: |
          mv artifacts/extension/html2md-extension.zip artifacts/extension/html2md-extension-${{ steps.version.outputs.VERSION }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.blockmap
            artifacts/**/*.yml
            artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
